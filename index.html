<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ਚਿੱਠੀ · Chithi</title>
  <meta name="description" content="Chithi — private letters for the ones you love" />
  <meta name="theme-color" content="#b5541a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chithi" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:     #1a1208;
      --paper:   #f7f0e6;
      --sepia:   #c8a96e;
      --rust:    #b5541a;
      --cream:   #fffdf7;
      --muted:   #8a7560;
      --border:  #e2d5be;
      --unread:  #b5541a;
      --safe:    #3a7a4a;
      --warn:    #c47a10;
      --card-sh: 0 2px 16px rgba(26,18,8,0.09);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* AUTH */
    #screen-auth {
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--cream);
    }

    .auth-brand { text-align: center; margin-bottom: 2.5rem; }
    .auth-brand .gurmukhi {
      font-size: 2.8rem; color: var(--rust);
      letter-spacing: 0.02em; line-height: 1; display: block;
    }
    .auth-brand .roman {
      font-family: 'Lora', serif; font-style: italic;
      font-size: 1.1rem; color: var(--muted);
      margin-top: 0.3rem; display: block;
    }
    .auth-brand .tagline {
      font-size: 0.82rem; color: var(--muted);
      margin-top: 0.6rem; letter-spacing: 0.04em;
    }

    .auth-card {
      background: #fff; border-radius: 20px;
      padding: 2rem 1.75rem; width: 100%; max-width: 360px;
      box-shadow: var(--card-sh); border: 1px solid var(--border);
    }

    .field-label {
      font-size: 0.75rem; font-weight: 500; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 0.35rem; display: block;
    }

    input[type="email"], input[type="password"], input[type="text"], textarea {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.97rem; font-family: 'DM Sans', sans-serif;
      background: var(--paper); color: var(--ink);
      outline: none; transition: border-color 0.2s; margin-bottom: 1rem;
    }
    input:focus, textarea:focus { border-color: var(--sepia); }

    .btn {
      display: block; width: 100%; padding: 0.85rem 1rem;
      border: none; border-radius: 12px; font-size: 0.97rem;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s; text-align: center;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; pointer-events: none; }
    .btn-primary { background: var(--rust); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); margin-top: 0.6rem; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-safe   { background: var(--safe); color: #fff; }
    .btn-sm { width: auto; display: inline-block; padding: 0.4rem 0.9rem; font-size: 0.82rem; border-radius: 8px; }

    .error-msg { color: #c0392b; font-size: 0.83rem; margin-top: 0.4rem; min-height: 1.2em; text-align: center; }

    /* HEADER */
    #app-header {
      background: var(--rust); color: #fff;
      padding: 0.9rem 1.1rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(181,84,26,0.3);
    }
    .header-brand { display: flex; align-items: baseline; gap: 0.5rem; }
    .header-brand .g { font-size: 1.4rem; line-height: 1; }
    .header-brand .r { font-family: 'Lora', serif; font-style: italic; font-size: 0.9rem; opacity: 0.85; }
    #unread-badge {
      cursor: pointer; background: #fff; color: var(--rust);
      font-weight: 700; font-size: 0.72rem; border-radius: 999px;
      padding: 0.12rem 0.5rem; margin-left: 0.3rem;
    }
    .header-actions { display: flex; align-items: center; gap: 0.6rem; }
    .icon-btn {
      background: rgba(255,255,255,0.18); border: none; border-radius: 8px;
      color: #fff; padding: 0.4rem 0.6rem; font-size: 1rem; cursor: pointer; line-height: 1;
    }

    /* TABS */
    #tabs {
      display: flex; background: #fff;
      border-bottom: 2px solid var(--border);
      position: sticky; top: 52px; z-index: 99;
    }
    .tab {
      flex: 1; padding: 0.8rem 0.5rem; text-align: center;
      font-size: 0.88rem; font-weight: 500; color: var(--muted);
      border: none; background: transparent; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: var(--rust); border-bottom-color: var(--rust); }

    /* PANELS */
    .panel { display: none; padding: 1.1rem; flex: 1; }
    .panel.active { display: block; }

    /* CONTACTS PANEL */
    .section-head {
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.75rem;
    }

    .my-code-box {
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .my-code-box .label { font-size: 0.78rem; color: var(--muted); }
    .my-code-box .code {
      font-family: 'Lora', serif; font-size: 1.3rem;
      color: var(--rust); letter-spacing: 0.06em; font-weight: 600;
    }

    .copy-btn {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.35rem 0.75rem;
      font-size: 0.78rem; color: var(--muted); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .add-contact-box {
      background: #fff; border: 1.5px dashed var(--border);
      border-radius: 14px; padding: 1rem 1.1rem; margin-bottom: 1.25rem;
    }
    .add-contact-box input { margin-bottom: 0.5rem; }

    .slots-grid { display: flex; flex-direction: column; gap: 0.7rem; }

    .slot-card {
      background: #fff; border-radius: 14px; padding: 1rem 1.1rem;
      box-shadow: var(--card-sh); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: box-shadow 0.2s; position: relative;
    }
    .slot-card:active { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .slot-card.empty { opacity: 0.5; cursor: default; background: var(--paper); }

    .slot-info { flex: 1; }
    .slot-name { font-weight: 600; font-size: 0.97rem; color: var(--ink); }
    .slot-town { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .slot-warn { font-size: 0.72rem; color: var(--warn); margin-top: 0.2rem; }

    .slot-right { display: flex; align-items: center; gap: 0.5rem; }

    .unread-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--rust); flex-shrink: 0;
    }

    .slot-number { font-size: 0.72rem; color: var(--border); font-weight: 600; min-width: 1.2rem; text-align: right; }

    .pen-btn {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 7px; padding: 0.25rem 0.45rem;
      font-size: 0.85rem; line-height: 1; cursor: pointer;
      color: var(--rust); transition: background 0.15s;
    }
    .pen-btn:active { background: var(--border); }

    /* HISTORY PANEL */
    .history-card {
      background: #fff; border-radius: 14px; padding: 1rem 1.1rem;
      box-shadow: var(--card-sh); border: 1px solid var(--border);
      border-left: 4px solid var(--sepia);
      cursor: pointer; transition: box-shadow 0.2s; margin-bottom: 0.75rem;
    }
    .history-card:active { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .history-card-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.4rem;
    }
    .history-contact { font-weight: 600; font-size: 0.88rem; color: var(--rust); }
    .history-time { font-size: 0.72rem; color: var(--muted); }
    .history-snippet {
      font-family: 'Lora', serif; font-size: 0.88rem; color: var(--ink);
      line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .history-from { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }

    /* THREAD VIEW */
    #thread-view {
      display: none; flex-direction: column;
      min-height: 100vh; background: var(--paper); overflow-y: auto;
    }
    #thread-view.active { display: flex; }

    #thread-header {
      background: var(--rust); color: #fff;
      padding: 0.9rem 1.1rem;
      display: flex; align-items: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 100;
    }
    #thread-back {
      background: rgba(255,255,255,0.18); border: none; border-radius: 8px;
      color: #fff; padding: 0.4rem 0.7rem; font-size: 1rem; cursor: pointer;
    }
    #thread-name { font-weight: 600; font-size: 1rem; }
    #thread-town { font-size: 0.78rem; opacity: 0.8; }
    #thread-actions { margin-left: auto; display: flex; gap: 0.5rem; }

    #thread-letters { padding: 1rem; display: flex; flex-direction: column; gap: 0.85rem; }

    .letter-bubble {
      background: #fff; border-radius: 14px; padding: 1rem 1.1rem;
      box-shadow: var(--card-sh); border: 1px solid var(--border);
      border-left: 4px solid var(--border);
    }
    .letter-bubble.unread { border-left-color: var(--rust); }
    .letter-bubble.mine   { border-left-color: var(--sepia); background: var(--cream); }

    .bubble-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .bubble-from { font-weight: 600; font-size: 0.82rem; color: var(--rust); }
    .bubble-from.mine-label { color: var(--sepia); }
    .bubble-time { font-size: 0.72rem; color: var(--muted); }

    .bubble-body {
      font-family: 'Lora', serif; font-size: 0.95rem;
      line-height: 1.7; color: var(--ink);
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble-body.collapsed {
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .bubble-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.6rem; }
    .read-toggle { font-size: 0.76rem; color: var(--sepia); cursor: pointer; font-weight: 500; }
    .save-btn {
      font-size: 0.76rem; color: var(--muted); cursor: pointer;
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.2rem 0.55rem;
    }

    #thread-compose {
      background: #fff; border-bottom: 2px solid var(--border); padding: 1rem;
    }
    #thread-compose textarea { min-height: 100px; resize: none; margin-bottom: 0.4rem; }
    .compose-footer { display: flex; justify-content: space-between; align-items: center; }
    #word-count { font-size: 0.78rem; color: var(--muted); }
    #word-count.over { color: #c0392b; font-weight: 600; }
    #thread-send { width: auto; padding: 0.55rem 1.3rem; font-size: 0.9rem; }

    /* ADMIN SCREEN */
    #screen-admin {
      display: none; flex-direction: column;
      min-height: 100vh; background: var(--paper);
    }
    #screen-admin.active { display: flex; }

    #admin-header {
      background: #2c2016; color: #fff;
      padding: 0.9rem 1.1rem;
      display: flex; align-items: center; gap: 0.75rem;
      position: sticky; top: 0; z-index: 100;
    }
    #admin-header h2 { font-size: 1rem; font-weight: 600; }
    #admin-body { padding: 1.1rem; display: flex; flex-direction: column; gap: 1rem; }

    .admin-slot {
      background: #fff; border-radius: 14px; padding: 1rem 1.1rem;
      border: 1px solid var(--border); box-shadow: var(--card-sh);
    }
    .admin-slot-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; }
    .admin-slot-name { font-weight: 600; font-size: 0.97rem; }
    .admin-slot-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .admin-slot-warn { font-size: 0.75rem; color: var(--warn); margin-top: 0.2rem; }
    .admin-slot-empty { opacity: 0.45; font-style: italic; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: #1a1208; color: #fff;
      padding: 0.65rem 1.3rem; border-radius: 999px;
      font-size: 0.88rem; font-weight: 500;
      z-index: 9999; transition: transform 0.3s ease;
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* MODAL */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,18,8,0.55); z-index: 500;
      align-items: flex-end; justify-content: center;
    }
    #modal-overlay.active { display: flex; }
    .modal-sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.5rem 2rem; width: 100%; max-width: 480px;
    }
    .modal-title { font-family: 'Lora', serif; font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--ink); }
    .modal-body { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; flex-direction: column; gap: 0.5rem; }

    /* SETTINGS */
    #settings-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,18,8,0.55); z-index: 600;
      align-items: flex-end; justify-content: center;
    }
    #settings-overlay.active { display: flex; }
    .settings-sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.5rem 2rem; width: 100%; max-width: 480px;
    }
    .settings-title { font-family: 'Lora', serif; font-size: 1.1rem; margin-bottom: 1.25rem; color: var(--ink); }
    .settings-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; color: var(--ink);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.2rem; }
    .settings-value { font-family: 'Lora', serif; font-size: 1.05rem; color: var(--rust); font-weight: 600; letter-spacing: 0.04em; }

    .auth-toggle { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--muted); }
    .auth-toggle a { color: var(--rust); cursor: pointer; text-decoration: underline; }

    .hidden { display: none !important; }
    .mt1 { margin-top: 1rem; }
    .mt05 { margin-top: 0.5rem; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="screen-auth" class="screen">
  <div class="auth-brand">
    <span class="gurmukhi">ਚਿੱਠੀ</span>
    <span class="roman">Chithi</span>
    <div class="tagline">Letters for the ones you love</div>
  </div>
  <div class="auth-card">
    <div id="signin-form">
      <label class="field-label">Email</label>
      <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email" />
      <label class="field-label">Password</label>
      <div style="position:relative;margin-bottom:0">
        <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password" style="margin-bottom:0;padding-right:3rem" />
        <button type="button" id="toggle-pass" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);width:auto;padding:0">👁</button>
      </div>
      <div style="height:1rem"></div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="error-msg" id="auth-error"></div>
      <div class="auth-toggle">New here? <a id="show-signup">Create an account</a></div>
    </div>
    <div id="signup-form" class="hidden">
      <label class="field-label">Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email" />
      <label class="field-label">Password</label>
      <div style="position:relative;margin-bottom:0">
        <input type="password" id="signup-pass" placeholder="Min 6 characters" autocomplete="new-password" style="margin-bottom:0;padding-right:3rem" />
        <button type="button" id="toggle-signup-pass" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--muted);width:auto;padding:0">👁</button>
      </div>
      <div style="height:0.75rem"></div>
      <label class="field-label">Your name</label>
      <input type="text" id="signup-name" placeholder="e.g. Gurpreet Kaur" maxlength="30" />
      <label class="field-label">Invite code</label>
      <input type="text" id="signup-invite" placeholder="Enter invite code" autocomplete="off" />
      <button class="btn btn-primary" id="signup-btn">Create Account</button>
      <div class="error-msg" id="signup-error"></div>
      <div class="auth-toggle">Already have an account? <a id="show-signin">Sign in</a></div>
    </div>
  </div>
</div>

<!-- MAIN APP SCREEN -->
<div id="screen-app" class="screen">
  <div id="app-header">
    <div class="header-brand">
      <span class="g">ਚਿੱਠੀ</span>
      <span class="r">Chithi</span>
      <span id="unread-badge" class="hidden">0</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="gear-btn" title="Settings">⚙️</button>
      <button class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
      <button class="icon-btn" id="signout-btn" title="Sign out">↩</button>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" data-tab="contacts">Contacts</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <!-- CONTACTS PANEL -->
  <div id="contacts-panel" class="panel active">
    <div class="my-code-box">
      <div>
        <div class="label">Your Chithi code</div>
        <div class="code" id="my-code-display">—</div>
      </div>
      <button class="copy-btn" id="copy-code-btn">Copy</button>
    </div>

    <div class="add-contact-box">
      <div class="section-head">Add a contact</div>
      <input type="text" id="add-code-input" placeholder="Enter their code e.g. KAMALJIT-4821" maxlength="20" />
      <input type="text" id="add-label-input" placeholder="Their name / label" maxlength="30" />
      <input type="text" id="add-town-input" placeholder="Town / city (optional)" maxlength="30" />
      <button class="btn btn-primary btn-sm" id="add-contact-btn">Add Contact</button>
      <div class="error-msg" id="add-error"></div>
    </div>

    <div class="section-head">Your slots (10)</div>
    <div class="slots-grid" id="slots-grid"></div>

    <button class="btn btn-ghost mt1" id="leave-btn" style="font-size:0.85rem">Leave Chithi / Free my slot</button>
  </div>

  <!-- HISTORY PANEL -->
  <div id="history-panel" class="panel">
    <div class="section-head">Recent letters</div>
    <div id="history-list">
      <div style="color:var(--muted);font-size:0.88rem;padding:1rem 0">Loading history…</div>
    </div>
  </div>
</div>

<!-- THREAD VIEW -->
<div id="thread-view">
  <div id="thread-header">
    <button id="thread-back">←</button>
    <div>
      <div id="thread-name">—</div>
      <div id="thread-town"></div>
    </div>
    <div id="thread-actions">
      <button class="icon-btn" id="thread-leave-btn" title="Remove this contact">✕</button>
    </div>
  </div>

  <div id="thread-compose">
    <textarea id="compose-body" placeholder="Write your letter…" maxlength="9999"></textarea>
    <div class="compose-footer">
      <span id="word-count">0 / 500 words</span>
      <button class="btn btn-primary" id="thread-send">Send ✉️</button>
    </div>
  </div>

  <div id="thread-letters"></div>
</div>

<!-- ADMIN SCREEN -->
<div id="screen-admin">
  <div id="admin-header">
    <button class="icon-btn" id="admin-back">←</button>
    <h2>⚙️ Postmaster Panel</h2>
  </div>
  <div id="admin-body"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div class="settings-sheet">
    <div class="settings-title">⚙️ Settings</div>
    <div id="settings-body"></div>
    <button class="btn btn-ghost mt1" id="settings-close">Close</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FIREBASE + APP LOGIC -->
<script>
  const CACHE_VERSION = "chithi-v17";
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
  if ('caches' in window) {
    caches.keys().then(keys => keys.forEach(key => { if (key !== CACHE_VERSION) caches.delete(key); }));
  }
</script>

  const snap = await get(slotsRef(uid));
  if (!snap.exists()) return Array(MAX_SLOTS).fill(null);
  const slots = Array(MAX_SLOTS).fill(null);
  snap.forEach(child => { slots[parseInt(child.key)] = child.val(); });
  return slots;
}

async function findCodeOwner(code) {
  const cleanCode = code.toUpperCase().trim();
  try {
    const snap = await get(codeIndexRef(cleanCode));
    if (!snap.exists()) return null;
    const val = snap.val();
    let uid;
    if (typeof val === "string") uid = val;
    else if (val && typeof val === "object" && typeof val.uid === "string") uid = val.uid;
    else return null;
    const profileSnap = await get(profileRef(uid));
    if (!profileSnap.exists()) return null;
    return { uid, ...profileSnap.val() };
  } catch(e) {
    console.error("[findCodeOwner] error:", e.code, e.message);
    throw e;
  }
}

  addError.textContent = "";

  const label = addLabelInput.value.trim();
  const town  = addTownInput.value.trim();

  if (!code)  { addError.textContent = "Enter their code."; return; }
  if (!label) { addError.textContent = "Enter a name/label."; return; }

  addContactBtn.disabled = true; addContactBtn.textContent = "Adding…";

  try {
    if (code === ME.code) {
      addError.textContent = "That's your own code!";
      addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
      return;
    }

    const slots = await getMySlots();
    const alreadyIn = slots.some(s => s && s.contactCode === code);
    if (alreadyIn) {
      addError.textContent = "This person is already in your contacts.";
      addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
      return;
    }

    const emptyIdx = slots.findIndex(s => s === null);
    if (emptyIdx === -1) {
      addError.textContent = "All 10 slots are full. Free one first.";
      addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
      return;
    }

    const contact = await findCodeOwner(code);
    if (!contact) {
      addError.textContent = "No one found with that code.";
      addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
      return;
    }

    const theirSlots = await getSlotsOf(contact.uid);
    const alreadyHasMe = theirSlots.some(s => s && s.contactCode === ME.code);
    const theirEmptyIdx = theirSlots.findIndex(s => s === null);

    if (!alreadyHasMe && theirEmptyIdx === -1) {
      addError.textContent = `${label}'s contact list is full. Ask them to free a slot first.`;
      addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
      return;
    }

    const now = Date.now();
    const atomicWrite = {
      [`users/${ME.uid}/slots/${emptyIdx}`]: {
        contactUid:   contact.uid,
        contactCode:  code,
        contactName:  label,
        contactTown:  town,
        addedAt:      now,
        lastActivity: now
      }
    };

    if (!alreadyHasMe) {
      atomicWrite[`users/${contact.uid}/slots/${theirEmptyIdx}`] = {
        contactUid:   ME.uid,
        contactCode:  ME.code,
        contactName:  ME.displayName,
        contactTown:  "",
        addedAt:      now,
        lastActivity: now
      };
    }

    await update(ref(db, "chithi"), atomicWrite);
    addCodeInput.value = ""; addLabelInput.value = ""; addTownInput.value = "";
    const mutualMsg = alreadyHasMe ? `${label} added ✅` : `${label} added ✅ — they can see you too`;
    showToast(mutualMsg);
    renderSlots();
  } catch (e) {
    addError.textContent = "Failed: " + (e.message || e.code || "unknown error");
  }

  addContactBtn.disabled = false; addContactBtn.textContent = "Add Contact";
});

async function renderSlots() {
  slotsGrid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem">Loading contacts…</div>';
  const slots = await getMySlots();
  let totalUnread = 0;
  slotsGrid.innerHTML = "";

  for (let i = 0; i < MAX_SLOTS; i++) {
    const s = slots[i];
    const card = document.createElement("div");
    card.className = "slot-card" + (s ? "" : " empty");

    if (!s) {
      card.innerHTML = `
        <div class="slot-info">
          <div class="slot-name" style="color:var(--muted);font-weight:400">Empty slot</div>
        </div>
        <div class="slot-number">${i + 1}</div>`;
    } else {
      let unread = 0;
      const seenIds = new Set();
      try {
        const [pa, pb] = sortedUids(ME.uid, s.contactUid);
        const unreadPaths = [
          `chithi/letters/${pa}/${pb}`,
          `chithi/letters/${pa}_${pb}`,
          `chithi/letters/${ME.uid}_${s.contactUid}`,
          `chithi/letters/${s.contactUid}_${ME.uid}`
        ];
        for (const path of unreadPaths) {
          try {
            const snap = await get(ref(db, path));
            if (snap.exists()) {
              snap.forEach(child => {
                if (!seenIds.has(child.key)) {
                  seenIds.add(child.key);
                  const l = child.val();
                  if (l && !l.read && l.from !== ME.uid) unread++;
                }
              });
            }
          } catch(_) {}
        }
      } catch(_) {}

      totalUnread += unread;

      const inactive = daysSince(s.lastActivity || s.addedAt);
      const warnHtml = inactive >= INACTIVITY_DAYS
        ? `<div class="slot-warn">⚠️ No activity for ${inactive} days</div>` : "";

      card.innerHTML = `
        <div class="slot-info">
          <div class="slot-name">${s.contactName}</div>
          <div class="slot-town">${s.contactTown || ""}</div>
          ${warnHtml}
        </div>
        <div class="slot-right">
          ${unread > 0 ? `<div class="unread-dot"></div>` : ""}
          <button class="pen-btn" title="Open thread">✏️</button>
          <div class="slot-number">${i + 1}</div>
        </div>`;

      card.addEventListener("click", () => openThread(i, s));
    }

    slotsGrid.appendChild(card);
  }

  if (totalUnread > 0) {
    unreadBadge.textContent = totalUnread;
    unreadBadge.classList.remove("hidden");
  } else {
    unreadBadge.classList.add("hidden");
  }
}

// ─────────────────────────────────────────────
// RENDER HISTORY
// ─────────────────────────────────────────────
async function renderHistory() {
  historyList.innerHTML = '<div style="color:var(--muted);font-size:0.88rem;padding:1rem 0">Loading…</div>';

  try {
    const slots = await getMySlots();
    const occupied = slots.map((s, i) => s ? { ...s, slotIdx: i } : null).filter(Boolean);

    if (occupied.length === 0) {
      historyList.innerHTML = '<div style="color:var(--muted);font-size:0.88rem;padding:1rem 0">No contacts yet. Add one in the Contacts tab.</div>';
      return;
    }

    // Gather recent letters from all contacts
    const allLetters = [];

    for (const slot of occupied) {
      try {
        const [pa, pb] = sortedUids(ME.uid, slot.contactUid);
        const pathsToTry = [
          `chithi/letters/${pa}/${pb}`,
          `chithi/letters/${pa}_${pb}`,
          `chithi/letters/${ME.uid}_${slot.contactUid}`,
          `chithi/letters/${slot.contactUid}_${ME.uid}`
        ];
        const seenIds = new Set();
        for (const path of pathsToTry) {
          try {
            const snap = await get(ref(db, path));
            if (snap.exists()) {
              snap.forEach(c => {
                const v = c.val();
                if (v && v.body && v.ts && !seenIds.has(c.key)) {
                  seenIds.add(c.key);
                  allLetters.push({
                    id:          c.key,
                    body:        v.body,
                    ts:          v.ts,
                    fromName:    v.fromName,
                    from:        v.from,
                    contactName: slot.contactName,
                    contactTown: slot.contactTown || "",
                    slot:        slot
                  });
                }
              });
            }
          } catch(_) {}
        }
      } catch(_) {}
    }

    if (allLetters.length === 0) {
      historyList.innerHTML = '<div style="color:var(--muted);font-size:0.88rem;padding:1rem 0">No letters yet. Open a contact and write the first one ✉️</div>';
      return;
    }

    // Sort newest first, take top 5
    allLetters.sort((a, b) => b.ts - a.ts);
    const recent = allLetters.slice(0, 5);

    historyList.innerHTML = "";
    for (const letter of recent) {
      const isMine = letter.from === ME.uid;
      const card = document.createElement("div");
      card.className = "history-card";

      const top = document.createElement("div");
      top.className = "history-card-top";

      const contact = document.createElement("span");
      contact.className = "history-contact";
      contact.textContent = letter.contactName + (letter.contactTown ? ` · ${letter.contactTown}` : "");

      const time = document.createElement("span");
      time.className = "history-time";
      time.textContent = formatDate(letter.ts);

      top.appendChild(contact);
      top.appendChild(time);

      const from = document.createElement("div");
      from.className = "history-from";
      from.textContent = isMine ? "You wrote:" : `${letter.fromName} wrote:`;

      const snippet = document.createElement("div");
      snippet.className = "history-snippet";
      snippet.textContent = letter.body;

      card.appendChild(top);
      card.appendChild(from);
      card.appendChild(snippet);

      card.addEventListener("click", () => openThread(letter.slot.slotIdx, letter.slot));
      historyList.appendChild(card);
    }

  } catch(e) {
    historyList.innerHTML = `<div style="color:#c0392b;font-size:0.85rem">Failed to load history: ${e.message}</div>`;
  }
}

  threadName.textContent = slot.contactName;

async function loadThreadLetters(slot) {
  threadLetters.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:0.5rem">Loading…</div>';
  threadTown.textContent = slot.contactTown || "";
  try {
    const [pa, pb] = sortedUids(ME.uid, slot.contactUid);
    const letters = {};

    const pathsToTry = [
      `chithi/letters/${pa}/${pb}`,
      `chithi/letters/${pa}_${pb}`,
      `chithi/letters/${ME.uid}_${slot.contactUid}`,
      `chithi/letters/${slot.contactUid}_${ME.uid}`
    ];

    for (const path of pathsToTry) {
      try {
        const snap = await get(ref(db, path));
        if (snap.exists()) {
          snap.forEach(c => {
            const v = c.val();
            if (v && v.body && v.ts) letters[c.key] = { id: c.key, _path: path, ...v };
          });
        }
      } catch(_) {}
    }

    const letterList = Object.values(letters);
    letterList.sort((a, b) => b.ts - a.ts);
    threadLetters.innerHTML = "";

    if (letterList.length === 0) {
      threadLetters.innerHTML = '<div style="color:var(--muted);font-size:0.9rem;padding:1rem;text-align:center">No letters yet. Write the first one ✉️</div>';
      return;
    }

    letterList.forEach(letter => {
      if (!letter.read && letter.from !== ME.uid) {
        update(ref(db, `${letter._path}/${letter.id}`), { read: true }).catch(() => {});
        letter.read = true;
      }
    });

    for (const letter of letterList) {
      const isMine   = letter.from === ME.uid;

      const bubble = document.createElement("div");
      bubble.className = `letter-bubble${isMine ? " mine" : ""}`;

      const meta = document.createElement("div");
      meta.className = "bubble-meta";

      const fromSpan = document.createElement("span");
      fromSpan.className = "bubble-from" + (isMine ? " mine-label" : "");
      fromSpan.textContent = letter.fromName;

      const timeSpan = document.createElement("span");
      timeSpan.className = "bubble-time";
      timeSpan.textContent = formatDate(letter.ts);

      meta.appendChild(fromSpan);
      meta.appendChild(timeSpan);
      bubble.appendChild(meta);

      const body = document.createElement("div");
      body.className = "bubble-body collapsed";
      body.textContent = letter.body;
      bubble.appendChild(body);

      const footer = document.createElement("div");
      footer.className = "bubble-footer";

      let expanded = false;
      const toggle = document.createElement("span");
      toggle.className = "read-toggle";
      toggle.textContent = "Read full letter";
      toggle.addEventListener("click", () => {
        expanded = !expanded;
        body.classList.toggle("collapsed", !expanded);
        toggle.textContent = expanded ? "Collapse" : "Read full letter";
      });

      const saveBtn = document.createElement("button");
      saveBtn.className = "save-btn";
      saveBtn.textContent = "⬇ Save";
      saveBtn.addEventListener("click", () => saveLetter(letter, slot.contactName));

      footer.appendChild(toggle);
      footer.appendChild(saveBtn);
      bubble.appendChild(footer);
      threadLetters.appendChild(bubble);
    }

    try {
      await update(slotRef(ME.uid, activeContactSlot.slotIdx), { lastActivity: Date.now() });
    } catch(e) {}

  } catch(e) {
    threadLetters.innerHTML = `<div style="color:#c0392b;font-size:0.85rem;padding:0.5rem">Failed to load: ${e.message || e.code}</div>`;
  }
}

// ─────────────────────────────────────────────
// SAVE LETTER
// ─────────────────────────────────────────────
function saveLetter(letter, contactName) {
  const text = [
    `ਚਿੱਠੀ · Chithi — Letter Export`,
    `From: ${letter.fromName}`,
    `To: ${letter.from === ME.uid ? contactName : ME.displayName}`,
    `Date: ${formatDate(letter.ts)}`,
    ``,
    letter.body
  ].join("\n");

  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `chithi-${letter.fromName}-${new Date(letter.ts).toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("Letter saved ✅");
}

// ─────────────────────────────────────────────
// WORD COUNT & SEND
// ─────────────────────────────────────────────
composeBody.addEventListener("input", () => {
  const wc = wordCountOf(composeBody.value);
  wordCount.textContent = `${wc} / ${MAX_WORDS} words`;
  wordCount.classList.toggle("over", wc > MAX_WORDS);
});

threadSend.addEventListener("click", async () => {
  const body = composeBody.value.trim();
  if (!body) { showToast("Write something first"); return; }
  if (wordCountOf(body) > MAX_WORDS) { showToast("Too long — keep it under 500 words"); return; }
  if (!activeContactSlot) return;

  threadSend.disabled = true; threadSend.textContent = "Sending…";

  try {
    const lRef   = lettersRef(ME.uid, activeContactSlot.contactUid);
    const capSnap = await get(lRef);
    const existing = [];
    capSnap.forEach(c => existing.push({ id: c.key, ts: c.val().ts }));

    if (existing.length >= MAX_LETTERS) {
      existing.sort((a, b) => a.ts - b.ts);
      const toDelete = existing.slice(0, existing.length - MAX_LETTERS + 1);
      for (const old of toDelete) {
        await remove(letterNodeRef(ME.uid, activeContactSlot.contactUid, old.id));
      }
    }

    await push(lRef, {
      from:      ME.uid,
      fromName:  ME.displayName,
      body:      body,
      ts:        Date.now(),
      read:      false
    });

    await update(slotRef(ME.uid, activeContactSlot.slotIdx), { lastActivity: Date.now() });

    composeBody.value = "";
    wordCount.textContent = `0 / ${MAX_WORDS} words`;
    showToast("Letter sent ✉️");
    await loadThreadLetters(activeContactSlot);
  } catch(e) {
    showToast("Failed to send: " + (e.message || e.code || "unknown error"));
  }

  threadSend.disabled = false; threadSend.textContent = "Send ✉️";
});

// ─────────────────────────────────────────────
// THREAD BACK
// ─────────────────────────────────────────────
threadBack.addEventListener("click", () => {
  showScreen("app");
  renderSlots();
});

// ─────────────────────────────────────────────
// REMOVE CONTACT FROM THREAD
// ─────────────────────────────────────────────
threadLeaveBtn.addEventListener("click", () => {
  const s = activeContactSlot;
  showModal(
    `Remove ${s.contactName}?`,
    `This will free slot ${s.slotIdx + 1}. Your letter history with ${s.contactName} will be deleted. Export any letters you want to keep first.`,
    [
      { label: "Export all first", cls: "btn-safe", action: async () => {
          await exportAllLetters(s);
          confirmRemoveContact(s);
        }
      },
      { label: "Remove without export", cls: "btn-danger", action: () => confirmRemoveContact(s) },
      { label: "Cancel", cls: "btn-ghost" }
    ]
  );
});

async function exportAllLetters(slot) {
  const snap = await get(lettersRef(ME.uid, slot.contactUid));
  const allLetters = [];
  snap.forEach(c => allLetters.push(c.val()));
  allLetters.sort((a, b) => a.ts - b.ts);
  const lines = [`ਚਿੱਠੀ · Chithi — Full History with ${slot.contactName}`, ""];
  allLetters.forEach(l => {
    lines.push(`[${formatDate(l.ts)}] ${l.fromName}:`);
    lines.push(l.body);
    lines.push("");
  });
  const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `chithi-history-${slot.contactName}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

async function confirmRemoveContact(slot) {
  try {
    await remove(lettersRef(ME.uid, slot.contactUid));
    await remove(slotRef(ME.uid, slot.slotIdx));
    showToast(`Slot ${slot.slotIdx + 1} freed ✅`);
    showScreen("app");
    renderSlots();
  } catch(e) {
    showToast("Failed. Try again.");
  }
}

// ─────────────────────────────────────────────
// LEAVE CHITHI
// ─────────────────────────────────────────────
leaveBtn.addEventListener("click", () => {
  showModal(
    "Leave ਚਿੱਠੀ?",
    "This will delete your profile and free your slot from all contacts. You can re-join later with a new code. Your letter histories will be deleted.",
    [
      { label: "Leave & delete my data", cls: "btn-danger", action: leavChithi },
      { label: "Cancel", cls: "btn-ghost" }
    ]
  );
});

async function leavChithi() {
  try {
    const slots = await getMySlots();
    for (const s of slots) {
      if (s) await remove(lettersRef(ME.uid, s.contactUid));
    }
    await remove(codeIndexRef(ME.code));
    await remove(userRef(ME.uid));
    await signOut(auth);
    showToast("You've left Chithi. Goodbye 🙏");
  } catch(e) {
    showToast("Failed. Try again.");
  }
}

// ─────────────────────────────────────────────
// SETTINGS GEAR — FIXED ADMIN LINK
// ─────────────────────────────────────────────
gearBtn.addEventListener("click", () => {
  settingsBody.innerHTML = "";

  const codeRow = document.createElement("div");
  codeRow.className = "settings-row";
  codeRow.innerHTML = `
    <div>
      <div class="settings-label">Your Chithi code</div>
      <div class="settings-value">${ME.code}</div>
    </div>
    <button class="copy-btn" id="settings-copy-code">Copy</button>`;
  settingsBody.appendChild(codeRow);
  codeRow.querySelector("#settings-copy-code").addEventListener("click", () => {
    navigator.clipboard.writeText(ME.code).then(() => showToast("Code copied!"));
  });

  const nameRow = document.createElement("div");
  nameRow.className = "settings-row";
  nameRow.innerHTML = `
    <div>
      <div class="settings-label">Signed in as</div>
      <div style="font-size:0.9rem;font-weight:500">${ME.displayName}</div>
      <div style="font-size:0.75rem;color:var(--muted)">${ME.email}</div>
    </div>`;
  settingsBody.appendChild(nameRow);

  if (ME.email === OWNER_EMAIL) {
    const inviteRow = document.createElement("div");
    inviteRow.className = "settings-row";
    inviteRow.innerHTML = `
      <div>
        <div class="settings-label">Invite code (share to let others join)</div>
        <div class="settings-value">${INVITE_CODE}</div>
      </div>
      <button class="copy-btn" id="settings-copy-invite">Copy</button>`;
    settingsBody.appendChild(inviteRow);
    inviteRow.querySelector("#settings-copy-invite").addEventListener("click", () => {
      navigator.clipboard.writeText(INVITE_CODE).then(() => showToast("Invite code copied!"));
    });

    const adminRow = document.createElement("div");
    adminRow.className = "settings-row";
    adminRow.innerHTML = `<div style="color:var(--rust);font-weight:500;cursor:pointer" id="settings-admin-link">⚙️ Open Postmaster Panel →</div>`;
    settingsBody.appendChild(adminRow);

    adminRow.querySelector("#settings-admin-link").addEventListener("click", () => {
      // Close settings overlay first
      settingsOverlay.classList.remove("active");
      // Show admin screen explicitly
      screenAuth.classList.remove("active");
      screenApp.classList.remove("active");
      threadView.classList.remove("active");
      screenAdmin.classList.remove("active");
      screenAdmin.style.display = "flex";
      screenAdmin.classList.add("active");
      renderAdminPanel();
    });
  }

  settingsOverlay.classList.add("active");
});

settingsClose.addEventListener("click", () => settingsOverlay.classList.remove("active"));
settingsOverlay.addEventListener("click", e => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove("active");
});

// ─────────────────────────────────────────────
// ADMIN BACK — FIXED
// ─────────────────────────────────────────────
adminBack.addEventListener("click", () => {
  screenAdmin.classList.remove("active");
  screenAdmin.style.display = "";
  showScreen("app");
  renderSlots();
});

// ─────────────────────────────────────────────
// ADMIN PANEL
// ─────────────────────────────────────────────
async function renderAdminPanel() {
  adminBody.innerHTML = '<div style="color:var(--muted);padding:1rem">Loading all slots…</div>';

  try {
    const snap = await get(ref(db, "chithi/users"));
    if (!snap.exists()) {
      adminBody.innerHTML = '<div style="color:var(--muted);padding:1rem">No users yet.</div>';
      return;
    }

    adminBody.innerHTML = "";

    snap.forEach(userSnap => {
      const uid      = userSnap.key;
      const profile  = userSnap.val().profile;
      const slotsRaw = userSnap.val().slots || {};

      if (!profile) return;

      const userSection = document.createElement("div");
      userSection.style.marginBottom = "1.25rem";

      const heading = document.createElement("div");
      heading.className = "section-head";
      heading.textContent = `${profile.displayName} (${profile.code})`;
      userSection.appendChild(heading);

      for (let i = 0; i < MAX_SLOTS; i++) {
        const s     = slotsRaw[i] || null;
        const aCard = document.createElement("div");
        aCard.className = "admin-slot";

        if (!s) {
          aCard.innerHTML = `
            <div class="admin-slot-head">
              <div>
                <div class="admin-slot-name admin-slot-empty">Slot ${i+1} — empty</div>
              </div>
            </div>`;
        } else {
          const inactive = daysSince(s.lastActivity || s.addedAt);
          const warnHtml = inactive >= INACTIVITY_DAYS
            ? `<div class="admin-slot-warn">⚠️ Inactive ${inactive} days</div>` : "";

          aCard.innerHTML = `
            <div class="admin-slot-head">
              <div>
                <div class="admin-slot-name">Slot ${i+1} — ${s.contactName}</div>
                <div class="admin-slot-meta">${s.contactTown || ""} · Code: ${s.contactCode}</div>
                <div class="admin-slot-meta">Last activity: ${formatDate(s.lastActivity || s.addedAt)}</div>
                ${warnHtml}
              </div>
              <button class="btn btn-danger btn-sm" data-uid="${uid}" data-slot="${i}" data-contact="${s.contactUid}" data-name="${s.contactName}">Free</button>
            </div>`;

          aCard.querySelector("button").addEventListener("click", async (e) => {
            const btn         = e.currentTarget;
            const targetUid   = btn.dataset.uid;
            const slotIndex   = parseInt(btn.dataset.slot);
            const contactUid  = btn.dataset.contact;
            const contactName = btn.dataset.name;

            showModal(
              `Force-free slot?`,
              `Remove ${contactName} from slot ${slotIndex+1} of ${profile.displayName}? Letter history will be deleted.`,
              [
                { label: "Free slot", cls: "btn-danger", action: async () => {
                    try {
                      await remove(lettersRef(targetUid, contactUid));
                      await remove(ref(db, `chithi/users/${targetUid}/slots/${slotIndex}`));
                      showToast("Slot freed ✅");
                      renderAdminPanel();
                    } catch(_) { showToast("Failed."); }
                  }
                },
                { label: "Cancel", cls: "btn-ghost" }
              ]
            );
          });
        }

        userSection.appendChild(aCard);
      }

      adminBody.appendChild(userSection);
    });

  } catch(e) {
    adminBody.innerHTML = '<div style="color:#c0392b;padding:1rem">Failed to load admin data.</div>';
  }
}
